<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cohen-Sutherland</title>

<style>
body {
  text-align: center;
  font-family: Arial;
}

canvas {
  border: 1px solid black;
}
</style>
</head>

<body>

<h2>Recorte de líneas - Cohen Sutherland</h2>

<canvas id="canvas" width="500" height="400"></canvas>
<br><br>

<!-- se crean los botones para ingresar los puntos y empezar a dibujar las líneas -->
X1 <input id="x1" type="number">
Y1 <input id="y1" type="number">
X2 <input id="x2" type="number">
Y2 <input id="y2" type="number">

<button onclick="dibujar()">Dibujar</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// 🟩 la ventana se define como un viewport dinámico (no fijo)
let windowClip = {
  x: 100,
  y: 80,
  w: 300,
  h: 220
};

// se inicia el primer paso del algoritmo de cohen, se calculan los códigos de cada región
function computeCode(x, y){
  let code = 0;

  // arriba
  if (y > windowClip.y + windowClip.h) code |= 8;

  // abajo
  if (y < windowClip.y) code |= 4;

  // derecha
  if (x > windowClip.x + windowClip.w) code |= 2;

  // izquierda
  if (x < windowClip.x) code |= 1;

  return code;
}

// ALGORITMO COHEN-SUTHERLAND
// se revisa cada caso y se realiza el recorte
function cohenSutherland(x1, y1, x2, y2){

  let code1 = computeCode(x1, y1);
  let code2 = computeCode(x2, y2);

  while (true) {

    // CASO 1: totalmente dentro del viewport
    if ((code1 | code2) === 0) break;

    // CASO 2: totalmente fuera
    if ((code1 & code2) !== 0) return null;

    // CASO 3: recorte
    // se calcula el punto de intersección y se procede a recortar
    let codeOut = code1 !== 0 ? code1 : code2;
    let x, y;

    // arriba
    if (codeOut & 8) {
      x = x1 + (x2 - x1) * ((windowClip.y + windowClip.h) - y1) / (y2 - y1);
      y = windowClip.y + windowClip.h;
    }
    // abajo
    else if (codeOut & 4) {
      x = x1 + (x2 - x1) * (windowClip.y - y1) / (y2 - y1);
      y = windowClip.y;
    }
    // derecha
    else if (codeOut & 2) {
      y = y1 + (y2 - y1) * ((windowClip.x + windowClip.w) - x1) / (x2 - x1);
      x = windowClip.x + windowClip.w;
    }
    // izquierda
    else if (codeOut & 1) {
      y = y1 + (y2 - y1) * (windowClip.x - x1) / (x2 - x1);
      x = windowClip.x;
    }

    // se reemplaza el punto que estaba fuera por el nuevo punto recortado
    if (codeOut === code1) {
      x1 = x;
      y1 = y;
      code1 = computeCode(x1, y1);
    } else {
      x2 = x;
      y2 = y;
      code2 = computeCode(x2, y2);
    }
  }

  return { x1, y1, x2, y2 };
}

// 🖱️ la ventana se mueve libre con el mouse y no es fija
let dragging = false;
let offsetX, offsetY;

canvas.addEventListener("mousedown", (e) => {
  let rect = canvas.getBoundingClientRect();
  let mx = e.clientX - rect.left;
  let my = e.clientY - rect.top;

  if (
    mx > windowClip.x &&
    mx < windowClip.x + windowClip.w &&
    my > windowClip.y &&
    my < windowClip.y + windowClip.h
  ) {
    dragging = true;
    offsetX = mx - windowClip.x;
    offsetY = my - windowClip.y;
  }
});

// cambia la ventana y se vuelve a dibujar y recortar en tiempo real
canvas.addEventListener("mousemove", (e) => {
  if (!dragging) return;

  let rect = canvas.getBoundingClientRect();
  let mx = e.clientX - rect.left;
  let my = e.clientY - rect.top;

  windowClip.x = mx - offsetX;
  windowClip.y = my - offsetY;

  dibujar();
});

canvas.addEventListener("mouseup", () => dragging = false);
canvas.addEventListener("mouseleave", () => dragging = false);

// FUNCIÓN PRINCIPAL
// se dibuja la ventana, la línea original y la línea recortada
function dibujar(){

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // se dibuja la ventana
  ctx.strokeStyle = "black";
  ctx.strokeRect(windowClip.x, windowClip.y, windowClip.w, windowClip.h);

  let x1 = parseInt(document.getElementById("x1").value);
  let y1 = parseInt(document.getElementById("y1").value);
  let x2 = parseInt(document.getElementById("x2").value);
  let y2 = parseInt(document.getElementById("y2").value);

  if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)) return;

  // línea original (azul)
  ctx.strokeStyle = "blue";
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

  // línea recortada (roja)
  let clipped = cohenSutherland(x1, y1, x2, y2);

  if (clipped) {
    ctx.strokeStyle = "red";
    ctx.beginPath();
    ctx.moveTo(clipped.x1, clipped.y1);
    ctx.lineTo(clipped.x2, clipped.y2);
    ctx.stroke();
  } else {
    alert("La línea está completamente fuera");
  }
}

// inicial
dibujar();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cohen-Sutherland con Plano Cartesiano</title>

  <style>
    body{
      text-align:center;
      font-family:Arial, sans-serif;
      margin:20px;
    }

    canvas{
      border:1px solid black;
      margin-bottom:15px;
    }

    input{
      width:80px;
      margin:5px;
    }

    #mensaje{
      margin-top:10px;
      font-weight:bold;
    }
  </style>
</head>
<body>

  <h2>Recorte de Líneas - Algoritmo Cohen-Sutherland</h2>

  <canvas id="canvas" width="600" height="500"></canvas>
  <br>

  <!-- entradas para coordenadas -->
  X1 <input id="x1" type="number" value="50">
  Y1 <input id="y1" type="number" value="50">

  X2 <input id="x2" type="number" value="450">
  Y2 <input id="y2" type="number" value="350">

  <button onclick="dibujar()">Dibujar</button>

  <div id="mensaje"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const mensaje = document.getElementById("mensaje");

// ventana de recorte dinámica
let windowClip = {
  x: 150,
  y: 120,
  w: 250,
  h: 180
};

// convierte coordenadas matemáticas al canvas
function convertirY(y){
  return canvas.height - y;
}

// dibuja cuadrícula del plano
function dibujarCuadricula(){
  ctx.strokeStyle = "#ddd";

  for(let x = 0; x < canvas.width; x += 20){
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, canvas.height);
    ctx.stroke();
  }

  for(let y = 0; y < canvas.height; y += 20){
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(canvas.width, y);
    ctx.stroke();
  }
}

// dibuja ejes cartesianos
function dibujarEjes(){
  ctx.strokeStyle = "black";

  // eje X
  ctx.beginPath();
  ctx.moveTo(0, convertirY(0));
  ctx.lineTo(canvas.width, convertirY(0));
  ctx.stroke();

  // eje Y
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, canvas.height);
  ctx.stroke();
}

// calcula código binario de región
function computeCode(x, y){
  let code = 0;

  // arriba
  if(y > windowClip.y + windowClip.h) code |= 8;

  // abajo
  if(y < windowClip.y) code |= 4;

  // derecha
  if(x > windowClip.x + windowClip.w) code |= 2;

  // izquierda
  if(x < windowClip.x) code |= 1;

  return code;
}

// algoritmo de recorte
function cohenSutherland(x1, y1, x2, y2){

  let code1 = computeCode(x1, y1);
  let code2 = computeCode(x2, y2);

  while(true){

    // caso 1: completamente dentro
    if((code1 | code2) === 0) break;

    // caso 2: completamente fuera
    if((code1 & code2) !== 0) return null;

    // caso 3: recortar
    let codeOut = code1 !== 0 ? code1 : code2;
    let x, y;

    if(codeOut & 8){ // arriba
      x = x1 + (x2 - x1) * ((windowClip.y + windowClip.h) - y1) / (y2 - y1);
      y = windowClip.y + windowClip.h;
    }
    else if(codeOut & 4){ // abajo
      x = x1 + (x2 - x1) * (windowClip.y - y1) / (y2 - y1);
      y = windowClip.y;
    }
    else if(codeOut & 2){ // derecha
      y = y1 + (y2 - y1) * ((windowClip.x + windowClip.w) - x1) / (x2 - x1);
      x = windowClip.x + windowClip.w;
    }
    else if(codeOut & 1){ // izquierda
      y = y1 + (y2 - y1) * (windowClip.x - x1) / (x2 - x1);
      x = windowClip.x;
    }

    // reemplaza punto externo
    if(codeOut === code1){
      x1 = x;
      y1 = y;
      code1 = computeCode(x1, y1);
    } else {
      x2 = x;
      y2 = y;
      code2 = computeCode(x2, y2);
    }
  }

  return {x1, y1, x2, y2};
}

// mover viewport con mouse
let dragging = false;
let offsetX, offsetY;

canvas.addEventListener("mousedown", (e)=>{
  let rect = canvas.getBoundingClientRect();
  let mx = e.clientX - rect.left;
  let my = canvas.height - (e.clientY - rect.top);

  if(
    mx > windowClip.x &&
    mx < windowClip.x + windowClip.w &&
    my > windowClip.y &&
    my < windowClip.y + windowClip.h
  ){
    dragging = true;
    offsetX = mx - windowClip.x;
    offsetY = my - windowClip.y;
  }
});

canvas.addEventListener("mousemove", (e)=>{
  if(!dragging) return;

  let rect = canvas.getBoundingClientRect();
  let mx = e.clientX - rect.left;
  let my = canvas.height - (e.clientY - rect.top);

  windowClip.x = mx - offsetX;
  windowClip.y = my - offsetY;

  dibujar();
});

canvas.addEventListener("mouseup", ()=> dragging = false);
canvas.addEventListener("mouseleave", ()=> dragging = false);

// dibujar todo
function dibujar(){

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  mensaje.textContent = "";

  dibujarCuadricula();
  dibujarEjes();

  // viewport
  ctx.strokeStyle = "green";
  ctx.strokeRect(
    windowClip.x,
    convertirY(windowClip.y + windowClip.h),
    windowClip.w,
    windowClip.h
  );

  let x1 = parseInt(document.getElementById("x1").value);
  let y1 = parseInt(document.getElementById("y1").value);
  let x2 = parseInt(document.getElementById("x2").value);
  let y2 = parseInt(document.getElementById("y2").value);

  if(isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)){
    mensaje.textContent = "Ingresa valores válidos.";
    return;
  }

  // línea original
  ctx.strokeStyle = "blue";
  ctx.beginPath();
  ctx.moveTo(x1, convertirY(y1));
  ctx.lineTo(x2, convertirY(y2));
  ctx.stroke();

  // línea recortada
  let clipped = cohenSutherland(x1, y1, x2, y2);

  if(clipped){
    ctx.strokeStyle = "red";
    ctx.beginPath();
    ctx.moveTo(clipped.x1, convertirY(clipped.y1));
    ctx.lineTo(clipped.x2, convertirY(clipped.y2));
    ctx.stroke();

    mensaje.textContent = "Recorte realizado correctamente.";
  } else {
    mensaje.textContent = "La línea está completamente fuera.";
  }
}

// inicializar
dibujar();
</script>

</body>
</html>

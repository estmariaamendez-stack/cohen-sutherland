<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cohen-Sutherland</title>

<style>
body {
  text-align: center;
  font-family: Arial;
}

canvas {
  border: 1px solid black;
}
</style>
</head>

<body>

<h2>Recorte de líneas - Cohen Sutherland</h2>

<canvas id="canvas" width="500" height="400"></canvas>
<br><br>

//se crean los botones para ingresar los puntos y empezara dibujar las lineas 
X1 <input id="x1" type="number">
Y1 <input id="y1" type="number">
X2 <input id="x2" type="number">
Y2 <input id="y2" type="number">

<button onclick="dibujar()">Dibujar</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ventana de recorte
const xmin = 100, xmax = 400;
const ymin = 80, ymax = 300;

// se crea la funcion para todo lo que se ve en el programa como la ventana o la linea 
function dibujarVentana(){
  ctx.strokeStyle = "black";
  ctx.strokeRect(xmin, ymin, xmax - xmin, ymax - ymin);
}

//se inicia el primer paso para el algoritmo de cohen , se empieza a calcular los codigos de cada region 
function computeCode(x, y){
  let code = 0;

  if (y > ymax) code |= 8;
  if (y < ymin) code |= 4;
  if (x > xmax) code |= 2;
  if (x < xmin) code |= 1;

  return code;
}
// ALGORITMO COHEN-SUTHERLAND se revisa cada caso y se realiza el recorte 
function cohenSutherland(x1, y1, x2, y2){

  let code1 = computeCode(x1, y1);
  let code2 = computeCode(x2, y2);

  let accept = false;

  while (true) {

    // CASO 1: totalmente dentro del viewpart 
    if ((code1 | code2) === 0) {
      accept = true;
      break;
    }

    // CASO 2: totalmente fuera
    if ((code1 & code2) !== 0) {
      return null;
    }

    // CASO 3: recorte, se calcula el punto de intersecci y se procede a recortar 
    let codeOut = code1 !== 0 ? code1 : code2;

    let x, y;

    // intersecciones
    if (codeOut & 8) { // arriba 1000
      x = x1 + (x2 - x1) * (ymax - y1) / (y2 - y1);
      y = ymax;
    }
    else if (codeOut & 4) { // abajo 0100
      x = x1 + (x2 - x1) * (ymin - y1) / (y2 - y1);
      y = ymin;
    }
    else if (codeOut & 2) { // derecha 0010
      y = y1 + (y2 - y1) * (xmax - x1) / (x2 - x1);
      x = xmax;
    }
    else if (codeOut & 1) { // izquierda 0001
      y = y1 + (y2 - y1) * (xmin - x1) / (x2 - x1);
      x = xmin;
    }

    //  se reemplaza el punto
    if (codeOut === code1) {
      x1 = x;
      y1 = y;
      code1 = computeCode(x1, y1);
    } else {
      x2 = x;
      y2 = y;
      code2 = computeCode(x2, y2);
    }
  }

  return { x1, y1, x2, y2 };
}

// FUNCIÓN PRINCIPAL
function dibujar(){

ctx.clearRect(0, 0, 500, 400);
  dibujarVentana();

  let x1 = parseInt(document.getElementById("x1").value);
  let y1 = parseInt(document.getElementById("y1").value);
  let x2 = parseInt(document.getElementById("x2").value);
  let y2 = parseInt(document.getElementById("y2").value);

  if (isNaN(x1) || isNaN(y1) || isNaN(x2) || isNaN(y2)) {
    alert("Ingresa todos los valores");
    return;
  }

  // línea original
  ctx.strokeStyle = "blue";
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();

    // se diseña y se especfica como es la línea recortada
  let clipped = cohenSutherland(x1, y1, x2, y2);

  if (clipped) {
    ctx.strokeStyle = "red";
    ctx.beginPath();
    ctx.moveTo(clipped.x1, clipped.y1);
    ctx.lineTo(clipped.x2, clipped.y2);
    ctx.stroke();
  } else {
    alert("La línea está completamente fuera");
  }
}

// inicial
dibujarVentana();

</script>

</body>
</html>
